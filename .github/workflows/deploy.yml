# Deploy to GitHub Pages
# Publishes the built dist/ to https://aizatiqmal656-crypto.github.io/hermes-workspace/
# on every push to main. Also triggerable manually via workflow_dispatch.
#
# One-time setup required in the GitHub repo:
#   Settings → Pages → Source → select "GitHub Actions"

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Grant the GITHUB_TOKEN the scopes required by actions/deploy-pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; cancel in-progress runs so a
# fast-follow push doesn't queue behind a stale build.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────
  # Job 1: Build
  # ─────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for any git-based version stamps

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build
        # --base sets the public path so all asset URLs resolve correctly
        # under the /hermes-workspace/ sub-path that GitHub Pages serves.
        run: pnpm exec vite build --base /hermes-workspace/
        env:
          NODE_ENV: production

      - name: Verify dist
        run: |
          echo "── dist/ contents ──"
          ls -lh dist/
          [ -f dist/terms.html ]   && echo "✅ terms.html"   || echo "⚠️  terms.html missing"
          [ -f dist/privacy.html ] && echo "✅ privacy.html" || echo "⚠️  privacy.html missing"

      # Create a 404.html that redirects to index.html so the SPA router
      # handles deep-link refreshes correctly on GitHub Pages.
      - name: Add SPA 404 redirect
        run: cp dist/index.html dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  # ─────────────────────────────────────────────────────────────────
  # Job 2: Deploy  (runs only after build succeeds)
  # ─────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

      - name: Print live URL
        run: |
          echo "🚀 Deployed to: ${{ steps.deploy.outputs.page_url }}"
          echo "📄 Terms:   ${{ steps.deploy.outputs.page_url }}terms.html"
          echo "🔒 Privacy: ${{ steps.deploy.outputs.page_url }}privacy.html"
